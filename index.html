<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Gelişmiş 3D FPS Futbol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: white; border: 2px solid black; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; }
        
        .bar-container { position: absolute; top: 20px; width: 40%; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 10px; overflow: hidden; }
        #stamina-container { left: 20px; }
        #stamina-fill { width: 100%; height: 100%; background: #2ecc71; transition: width 0.1s; }
        #power-container { left: 50%; transform: translateX(-50%); top: 50px; display: none; }
        #power-fill { width: 0%; height: 100%; background: #e74c3c; }
        #info { position: absolute; top: 20px; right: 20px; color: white; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px black; text-align: right; }

        /* Sabit ve Görünür Joystick */
        #joystick-zone { position: absolute; bottom: 0; left: 0; width: 50%; height: 50%; pointer-events: auto; }
        #joystick-base { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; display: block; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.9); border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: transform 0.05s; }

        #camera-zone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; }
        #buttons-container { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        
        .action-row { display: flex; gap: 10px; }
        .btn { width: 75px; height: 75px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 3px solid white; color: white; font-size: 14px; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:active { background: rgba(255,255,255,0.8); color: black; }
        #btn-shoot { border-color: #e74c3c; font-size: 16px; }
        #btn-sprint { border-color: #2ecc71; }
        
        #attack-btns { display: none; }
        #defense-btns { display: flex; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div class="bar-container" id="stamina-container"><div id="stamina-fill"></div></div>
        <div class="bar-container" id="power-container"><div id="power-fill"></div></div>
        <div id="info">Skor: 0 - 0<br><span id="status">Top Boşta</span></div>

        <div id="joystick-zone">
            <div id="joystick-base"><div id="joystick-stick"></div></div>
        </div>

        <div id="camera-zone">
            <div id="buttons-container">
                <div class="action-row" id="attack-btns">
                    <div class="btn" id="btn-cross">Orta</div>
                    <div class="btn" id="btn-pass">Pas</div>
                    <div class="btn" id="btn-shoot">Şut<br>(Kaydır)</div>
                </div>
                <div class="action-row" id="defense-btns">
                    <div class="btn" id="btn-slide">Kayma</div>
                    <div class="btn" id="btn-tackle">Müdahale</div>
                </div>
                <div class="action-row">
                    <div class="btn" id="btn-sprint">Sprint</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Saha
        const pitch = new THREE.Mesh(new THREE.PlaneGeometry(120, 200), new THREE.MeshLambertMaterial({ color: 0x27ae60 }));
        pitch.rotation.x = -Math.PI / 2;
        pitch.receiveShadow = true;
        scene.add(pitch);

        const goalBlue = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 5), new THREE.MeshLambertMaterial({ color: 0x3498db, transparent: true, opacity: 0.5 }));
        goalBlue.position.set(0, 5, 100); scene.add(goalBlue);
        
        const goalRed = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 5), new THREE.MeshLambertMaterial({ color: 0xe74c3c, transparent: true, opacity: 0.5 }));
        goalRed.position.set(0, 5, -100); scene.add(goalRed);

        // --- KARAKTER (İNSANSI) OLUŞTURUCU ---
        function createHumanoid(colorHex) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: colorHex });
            const skinMat = new THREE.MeshLambertMaterial({ color: 0xf1c27d });

            // Gövde
            const torso = new THREE.Mesh(new THREE.BoxGeometry(4, 6, 2), mat);
            torso.position.y = 6; torso.castShadow = true; group.add(torso);
            // Kafa
            const head = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), skinMat);
            head.position.y = 10.5; head.castShadow = true; group.add(head);
            // Kollar
            const armGeo = new THREE.BoxGeometry(1.2, 5, 1.2);
            const lArm = new THREE.Mesh(armGeo, skinMat); lArm.position.set(-3, 6, 0); lArm.castShadow = true; group.add(lArm);
            const rArm = new THREE.Mesh(armGeo, skinMat); rArm.position.set(3, 6, 0); rArm.castShadow = true; group.add(rArm);
            // Bacaklar
            const legGeo = new THREE.BoxGeometry(1.5, 6, 1.5);
            const lLeg = new THREE.Mesh(legGeo, mat); lLeg.position.set(-1.2, 3, 0); lLeg.castShadow = true; group.add(lLeg);
            const rLeg = new THREE.Mesh(legGeo, mat); rLeg.position.set(1.2, 3, 0); rLeg.castShadow = true; group.add(rLeg);

            return { model: group, lArm, rArm, lLeg, rLeg, head };
        }

        // Oyuncu ve Bot Modelleri
        const playerChar = createHumanoid(0x3498db); // Mavi formamız
        scene.add(playerChar.model);
        playerChar.model.position.set(0, 0, 80);

        const botChar = createHumanoid(0xe74c3c); // Kırmızı rakip
        scene.add(botChar.model);
        botChar.model.position.set(0, 0, -50);

        // Kamera yerleşimi (Kafanın içine, göz hizasına)
        let pitchObj = new THREE.Object3D();
        pitchObj.add(camera);
        playerChar.head.add(pitchObj); // Kamerayı kafaya bağladık
        pitchObj.position.set(0, 0, 0.5); // Gözler biraz önde olsun kafanın içini görmeyelim

        // Top
        const ball = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), new THREE.MeshLambertMaterial({ color: 0xffffff }));
        ball.castShadow = true; scene.add(ball);
        let ballP = { x: 0, y: 1.5, z: 0, vx: 0, vy: 0, vz: 0, curveX: 0, curveY: 0 };

        // Oyun Durumu
        let scores = { player: 0, bot: 0 };
        let state = { possession: 'none' };
        let input = { move: { x: 0, y: 0 }, sprint: false, actionCharge: 0, isCharging: false };
        let playerStats = { stamina: 100, speed: 0.35, sprintMult: 1.8 };
        let walkCycle = 0; // Animasyon döngüsü

        // --- SABİT JOYSTICK KONTROLLERİ ---
        const jZone = document.getElementById('joystick-zone');
        const jStick = document.getElementById('joystick-stick');
        const jBase = document.getElementById('joystick-base');
        let jTouch = null;
        let baseRect = jBase.getBoundingClientRect();
        let jCenter = { x: baseRect.left + 60, y: baseRect.top + 60 };

        window.addEventListener('resize', () => {
            baseRect = jBase.getBoundingClientRect();
            jCenter = { x: baseRect.left + 60, y: baseRect.top + 60 };
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });

        jZone.addEventListener('touchstart', (e) => {
            if(jTouch !== null) return;
            jTouch = e.changedTouches[0].identifier;
            updateJoystick(e.changedTouches[0]);
        });
        jZone.addEventListener('touchmove', (e) => {
            for(let t of e.changedTouches) if(t.identifier === jTouch) updateJoystick(t);
        });
        jZone.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === jTouch) { jTouch = null; jStick.style.transform = `translate(0px, 0px)`; input.move = { x: 0, y: 0 }; }
            }
        });

        function updateJoystick(t) {
            let dx = t.clientX - jCenter.x; let dy = t.clientY - jCenter.y;
            let dist = Math.sqrt(dx*dx + dy*dy); let max = 40;
            if(dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
            jStick.style.transform = `translate(${dx}px, ${dy}px)`;
            input.move = { x: dx/max, y: dy/max };
        }

        // --- KAMERA KONTROLLERİ (Sağ Ekran) ---
        const camZone = document.getElementById('camera-zone');
        let camTouch = null; let lastCam = { x: 0, y: 0 };
        camZone.addEventListener('touchstart', (e) => {
            if(e.target.classList.contains('btn')) return;
            if(camTouch === null) { camTouch = e.changedTouches[0].identifier; lastCam = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY }; }
        });
        camZone.addEventListener('touchmove', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === camTouch) {
                    playerChar.model.rotation.y -= (t.clientX - lastCam.x) * 0.005; // Tüm vücut döner
                    pitchObj.rotation.x -= (t.clientY - lastCam.y) * 0.005; // Sadece kafa aşağı yukarı
                    pitchObj.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/3, pitchObj.rotation.x));
                    lastCam = { x: t.clientX, y: t.clientY };
                }
            }
        });
        camZone.addEventListener('touchend', (e) => { for(let t of e.changedTouches) if(t.identifier === camTouch) camTouch = null; });

        // --- ŞUT VE KAYDIRMA (FALSO/SPIN) MEKANİĞİ ---
        const btnShoot = document.getElementById('btn-shoot');
        let swipeStart = {x: 0, y: 0}; let swipeCurrent = {x: 0, y: 0};
        
        btnShoot.addEventListener('touchstart', (e) => {
            e.preventDefault(); input.isCharging = true; document.getElementById('power-container').style.display = 'block';
            swipeStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
            swipeCurrent = {x: swipeStart.x, y: swipeStart.y};
        });
        btnShoot.addEventListener('touchmove', (e) => {
            e.preventDefault(); swipeCurrent = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        });
        btnShoot.addEventListener('touchend', (e) => {
            e.preventDefault(); 
            let dx = swipeCurrent.x - swipeStart.x; // Sağ/Sol Falso
            let dy = swipeCurrent.y - swipeStart.y; // Yukarı/Aşağı Falso
            executeShot(dx, dy);
        });

        document.getElementById('btn-sprint').addEventListener('touchstart', () => input.sprint = true);
        document.getElementById('btn-sprint').addEventListener('touchend', () => input.sprint = false);

        // --- FİZİK VE OYUN MANTIĞI ---
        function executeShot(swipeDx, swipeDy) {
            if(!input.isCharging || state.possession !== 'player') return;
            
            let power = input.actionCharge / 100; // 0 ile 1 arası
            
            // Kamera yönünü al
            let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(pitchObj.getWorldQuaternion(new THREE.Quaternion()));
            
            // KALİBRASYON: Max güçte karşı kalenin direğini hafif yalayacak (Z mesafesi 200 birim)
            let maxZForce = 4.2; 
            let maxYForce = 1.6; 
            
            let force = maxZForce * power;
            let upForce = maxYForce * power;

            // Kaydırma (Falso) Yorumlama
            ballP.curveX = 0; ballP.curveY = 0;
            
            if(swipeDx > 30) ballP.curveX = 0.05 * power; // Sağa çekti -> Sağa Falso
            if(swipeDx < -30) ballP.curveX = -0.05 * power; // Sola çekti -> Sola Falso
            
            if(swipeDy > 30) { ballP.curveY = -0.08 * power; upForce -= 0.3; } // Aşağı çekti -> Topspin (Ölü yaprak, hızla iner)
            if(swipeDy < -30) { ballP.curveY = 0.04 * power; upForce += 0.5; } // Yukarı çekti -> Backspin (Havalanarak gider)

            ballP.vx = forward.x * force;
            ballP.vy = forward.y * force + upForce;
            ballP.vz = forward.z * force;

            state.possession = 'none'; input.isCharging = false; input.actionCharge = 0;
            document.getElementById('power-container').style.display = 'none'; document.getElementById('power-fill').style.width = '0%';
        }

        function updateUI() {
            document.getElementById('attack-btns').style.display = state.possession === 'player' ? 'flex' : 'none';
            document.getElementById('defense-btns').style.display = state.possession === 'player' ? 'none' : 'flex';
            document.getElementById('stamina-fill').style.width = playerStats.stamina + '%';
            if(input.isCharging) {
                input.actionCharge = Math.min(100, input.actionCharge + 1.5);
                document.getElementById('power-fill').style.width = input.actionCharge + '%';
            }
        }

        function resetGame() {
            playerChar.model.position.set(0, 0, 80); botChar.model.position.set(0, 0, -50);
            ballP = { x: 0, y: 1.5, z: 0, vx: 0, vy: 0, vz: 0, curveX: 0, curveY: 0 };
            state.possession = 'none'; document.getElementById('info').innerHTML = `Skor: ${scores.player} - ${scores.bot}<br><span id="status">Top Boşta</span>`;
        }

        // Uzuv animasyon fonksiyonu
        function animateHumanoid(char, speedMagnitude) {
            if(speedMagnitude > 0.01) {
                char.walkCycle += speedMagnitude * 1.5; // Hıza göre animasyon hızı
                let swing = Math.sin(char.walkCycle) * 0.8;
                char.lArm.rotation.x = -swing; char.rArm.rotation.x = swing;
                char.lLeg.rotation.x = swing; char.rLeg.rotation.x = -swing;
            } else {
                char.lArm.rotation.x = 0; char.rArm.rotation.x = 0;
                char.lLeg.rotation.x = 0; char.rLeg.rotation.x = 0;
            }
        }
        playerChar.walkCycle = 0; botChar.walkCycle = 0;

        function animate() {
            requestAnimationFrame(animate);

            // 1. OYUNCU HAREKETİ VE ANİMASYON
            let speed = playerStats.speed;
            if(input.sprint && playerStats.stamina > 0) { speed *= playerStats.sprintMult; playerStats.stamina -= 0.5; } 
            else if (!input.sprint && playerStats.stamina < 100) playerStats.stamina += 0.2;

            let moveMag = 0;
            if(input.move.x !== 0 || input.move.y !== 0) {
                let dir = new THREE.Vector3(input.move.x, 0, input.move.y).applyAxisAngle(new THREE.Vector3(0,1,0), playerChar.model.rotation.y);
                playerChar.model.position.addScaledVector(dir, speed);
                playerChar.model.position.x = Math.max(-55, Math.min(55, playerChar.model.position.x));
                playerChar.model.position.z = Math.max(-95, Math.min(95, playerChar.model.position.z));
                moveMag = speed;
            }
            animateHumanoid(playerChar, moveMag);

            // 2. TOP FİZİĞİ (Magnus Etkisi / Falso)
            if(state.possession === 'player') {
                let offset = new THREE.Vector3(0, 1.5, -4).applyAxisAngle(new THREE.Vector3(0,1,0), playerChar.model.rotation.y);
                ballP.x = playerChar.model.position.x + offset.x; ballP.y = 1.5; ballP.z = playerChar.model.position.z + offset.z;
            } else if (state.possession === 'bot') {
                ballP.x = botChar.model.position.x; ballP.y = 1.5; ballP.z = botChar.model.position.z + 4;
            } else {
                ballP.vy -= 0.06; // Yerçekimi
                
                // Falso (Aerodinamik kavis) uygulaması
                let rightVec = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), playerChar.model.rotation.y);
                ballP.vx += rightVec.x * ballP.curveX;
                ballP.vz += rightVec.z * ballP.curveX;
                ballP.vy += ballP.curveY; // Yukarı veya aşağı ekstra kavis
                
                ballP.curveX *= 0.96; // Falso gücü zamanla kırılır
                ballP.curveY *= 0.96;

                ballP.x += ballP.vx; ballP.y += ballP.vy; ballP.z += ballP.vz;

                if(ballP.y < 1.5) { ballP.y = 1.5; ballP.vy *= -0.6; ballP.vx *= 0.95; ballP.vz *= 0.95; }
                if(ballP.x < -60 || ballP.x > 60) ballP.vx *= -1;
                
                if(ballP.z < -100 || ballP.z > 100) {
                    if(ballP.x > -15 && ballP.x < 15 && ballP.y < 15) {
                        if(ballP.z < -100) { scores.player++; resetGame(); return; }
                        if(ballP.z > 100) { scores.bot++; resetGame(); return; }
                    } else ballP.vz *= -1;
                }

                // Top kapma
                let dPlayer = new THREE.Vector2(playerChar.model.position.x, playerChar.model.position.z).distanceTo(new THREE.Vector2(ballP.x, ballP.z));
                let dBot = new THREE.Vector2(botChar.model.position.x, botChar.model.position.z).distanceTo(new THREE.Vector2(ballP.x, ballP.z));
                if(ballP.y < 5) {
                    if(dPlayer < 5) state.possession = 'player';
                    else if(dBot < 5) state.possession = 'bot';
                }
            }
            ball.position.set(ballP.x, ballP.y, ballP.z);
            ball.rotation.x += ballP.vz * 0.2; ball.rotation.z -= ballP.vx * 0.2;

            // 3. BOT YAPAY ZEKASI VE ANİMASYONU
            let botMoveMag = 0;
            if(state.possession === 'bot') {
                let dZ = 100 - botChar.model.position.z; let dX = 0 - botChar.model.position.x;
                let len = Math.sqrt(dX*dX + dZ*dZ);
                botChar.model.position.x += (dX/len) * 0.25; botChar.model.position.z += (dZ/len) * 0.25;
                botChar.model.rotation.y = Math.atan2(dX, dZ); botMoveMag = 0.25;
                if(botChar.model.position.z > 60) { state.possession = 'none'; ballP.vx = (0 - ball.position.x)*0.05; ballP.vy = 0.5; ballP.vz = 1.5; }
            } else if (state.possession === 'none') {
                let dZ = ball.position.z - botChar.model.position.z; let dX = ball.position.x - botChar.model.position.x;
                let len = Math.sqrt(dX*dX + dZ*dZ);
                if(len > 0) {
                    botChar.model.position.x += (dX/len) * 0.25; botChar.model.position.z += (dZ/len) * 0.25;
                    botChar.model.rotation.y = Math.atan2(dX, dZ); botMoveMag = 0.25;
                }
            }
            animateHumanoid(botChar, botMoveMag);

            updateUI();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
