<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>FPS Futbol Prototip</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* Arayüz (UI) Katmanı */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Nişangah (Crosshair) */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: white; border: 2px solid black; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; }
        
        /* Barlar */
        .bar-container { position: absolute; top: 20px; width: 40%; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 10px; overflow: hidden; }
        #stamina-container { left: 20px; }
        #stamina-fill { width: 100%; height: 100%; background: #2ecc71; transition: width 0.1s; }
        
        #power-container { left: 50%; transform: translateX(-50%); top: 50px; display: none; }
        #power-fill { width: 0%; height: 100%; background: #e74c3c; }

        /* Skor ve Bilgi */
        #info { position: absolute; top: 20px; right: 20px; color: white; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px black; text-align: right; }

        /* Kontroller - Sol Joystick Bölgesi */
        #joystick-zone { position: absolute; bottom: 0; left: 0; width: 50%; height: 50%; pointer-events: auto; }
        #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.7); border-radius: 50%; }

        /* Kontroller - Sağ Kamera ve Buton Bölgesi */
        #camera-zone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; }
        #buttons-container { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        
        .action-row { display: flex; gap: 10px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(0,0,0,0.4); border: 3px solid white; color: white; font-size: 14px; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        .btn:active { background: rgba(255,255,255,0.6); color: black; }
        #btn-sprint { border-color: #2ecc71; }
        
        /* Atak ve Defans Buton Grupları */
        #attack-btns { display: none; }
        #defense-btns { display: flex; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div class="bar-container" id="stamina-container"><div id="stamina-fill"></div></div>
        <div class="bar-container" id="power-container"><div id="power-fill"></div></div>
        
        <div id="info">Skor: 0 - 0<br><span id="status">Top Boşta</span></div>

        <div id="joystick-zone">
            <div id="joystick-base"><div id="joystick-stick"></div></div>
        </div>

        <div id="camera-zone">
            <div id="buttons-container">
                <div class="action-row" id="attack-btns">
                    <div class="btn" id="btn-cross">Orta</div>
                    <div class="btn" id="btn-pass">Pas</div>
                    <div class="btn" id="btn-shoot">Şut</div>
                </div>
                <div class="action-row" id="defense-btns">
                    <div class="btn" id="btn-slide">Kayma</div>
                    <div class="btn" id="btn-tackle">Müdahale</div>
                </div>
                <div class="action-row">
                    <div class="btn" id="btn-sprint">Sprint</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SAHNE VE THREE.JS KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Gökyüzü
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Saha
        const pitchGeo = new THREE.PlaneGeometry(120, 200);
        const pitchMat = new THREE.MeshLambertMaterial({ color: 0x27ae60 });
        const pitch = new THREE.Mesh(pitchGeo, pitchMat);
        pitch.rotation.x = -Math.PI / 2;
        pitch.receiveShadow = true;
        scene.add(pitch);

        // Kaleler
        const goalMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const goalBlue = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 5), goalMat); // Bizim Kale (Arkada)
        goalBlue.position.set(0, 5, 100);
        scene.add(goalBlue);
        
        const goalRed = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 5), new THREE.MeshLambertMaterial({ color: 0xffaaaa, transparent: true, opacity: 0.3 })); // Rakip Kale (Önde)
        goalRed.position.set(0, 5, -100);
        scene.add(goalRed);

        // --- 2. OYUN DEĞİŞKENLERİ VE OBJELER ---
        let scores = { player: 0, bot: 0 };
        let state = { possession: 'none' }; // 'player', 'bot', 'none'
        
        // Kamera/Oyuncu Rotasyonu (Kafa)
        let pitchObj = new THREE.Object3D(); // Yukarı aşağı
        let yawObj = new THREE.Object3D();   // Sağa sola
        yawObj.position.set(0, 6, 80); // Oyuncu başlangıç pozisyonu (Göz hizası = 6)
        yawObj.add(pitchObj);
        pitchObj.add(camera);
        scene.add(yawObj);

        // Top
        const ballGeo = new THREE.SphereGeometry(1.5, 32, 32);
        const ballMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        scene.add(ball);
        let ballPhysics = { x: 0, y: 1.5, z: 0, vx: 0, vy: 0, vz: 0, curve: 0 };

        // Bot (Rakip)
        const botGeo = new THREE.BoxGeometry(4, 12, 4);
        const botMat = new THREE.MeshLambertMaterial({ color: 0xe74c3c });
        const bot = new THREE.Mesh(botGeo, botMat);
        bot.position.set(0, 6, -50);
        bot.castShadow = true;
        scene.add(bot);
        let botSpeed = 0.3;

        // --- 3. KONTROLLER VE GİRİŞLER ---
        let input = {
            move: { x: 0, y: 0 },
            look: { x: 0, y: 0 },
            sprint: false,
            actionCharge: 0,
            isCharging: false,
            actionType: null // 'shoot', 'pass', 'cross'
        };

        let playerStats = { stamina: 100, speed: 0.4, sprintMultiplier: 1.8 };

        // Joystick Mantığı
        const joystickZone = document.getElementById('joystick-zone');
        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');
        let jTouchId = null;
        let jCenter = { x: 0, y: 0 };

        joystickZone.addEventListener('touchstart', (e) => {
            if(jTouchId !== null) return;
            const t = e.changedTouches[0];
            jTouchId = t.identifier;
            jCenter = { x: t.clientX, y: t.clientY };
            joystickBase.style.display = 'block';
            joystickBase.style.left = (jCenter.x - 60) + 'px';
            joystickBase.style.top = (jCenter.y - 60) + 'px';
            joystickStick.style.transform = `translate(0px, 0px)`;
        });

        joystickZone.addEventListener('touchmove', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === jTouchId) {
                    let dx = t.clientX - jCenter.x;
                    let dy = t.clientY - jCenter.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    let maxDist = 40;
                    if(distance > maxDist) { dx = (dx/distance)*maxDist; dy = (dy/distance)*maxDist; }
                    joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;
                    // Normalize to -1 to 1
                    input.move.x = dx / maxDist;
                    input.move.y = dy / maxDist;
                }
            }
        });

        joystickZone.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === jTouchId) {
                    jTouchId = null;
                    joystickBase.style.display = 'none';
                    input.move = { x: 0, y: 0 };
                }
            }
        });

        // Kamera Kaydırma Mantığı
        const cameraZone = document.getElementById('camera-zone');
        let camTouchId = null;
        let lastCamTouch = { x: 0, y: 0 };

        cameraZone.addEventListener('touchstart', (e) => {
            if(e.target.classList.contains('btn')) return; // Butona basıldıysa kamerayı çevirme
            if(camTouchId !== null) return;
            const t = e.changedTouches[0];
            camTouchId = t.identifier;
            lastCamTouch = { x: t.clientX, y: t.clientY };
        });

        cameraZone.addEventListener('touchmove', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === camTouchId) {
                    let dx = t.clientX - lastCamTouch.x;
                    let dy = t.clientY - lastCamTouch.y;
                    
                    yawObj.rotation.y -= dx * 0.005; // Sağa sola bakış
                    pitchObj.rotation.x -= dy * 0.005; // Yukarı aşağı bakış
                    // Boyun kırılmasını engelle
                    pitchObj.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitchObj.rotation.x));
                    
                    lastCamTouch = { x: t.clientX, y: t.clientY };
                }
            }
        });

        cameraZone.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) { if(t.identifier === camTouchId) camTouchId = null; }
        });

        // Buton Dinleyicileri
        const btnSprint = document.getElementById('btn-sprint');
        btnSprint.addEventListener('touchstart', () => input.sprint = true);
        btnSprint.addEventListener('touchend', () => input.sprint = false);

        const powerCont = document.getElementById('power-container');
        const powerFill = document.getElementById('power-fill');

        function setupActionBtn(id, type) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input.isCharging = true; input.actionType = type; powerCont.style.display = 'block'; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); executeAction(); });
        }
        setupActionBtn('btn-shoot', 'shoot');
        setupActionBtn('btn-pass', 'pass');
        setupActionBtn('btn-cross', 'cross');

        document.getElementById('btn-tackle').addEventListener('touchstart', (e) => { e.preventDefault(); attemptTackle(); });
        document.getElementById('btn-slide').addEventListener('touchstart', (e) => { e.preventDefault(); attemptTackle(true); });

        // --- 4. OYUN MEKANİKLERİ ---
        
        function updateUI() {
            const attackBtns = document.getElementById('attack-btns');
            const defBtns = document.getElementById('defense-btns');
            const statusTxt = document.getElementById('status');

            if(state.possession === 'player') {
                attackBtns.style.display = 'flex'; defBtns.style.display = 'none';
                statusTxt.innerText = "Top Sende!"; statusTxt.style.color = "#2ecc71";
            } else if(state.possession === 'bot') {
                attackBtns.style.display = 'none'; defBtns.style.display = 'flex';
                statusTxt.innerText = "Top Rakipte!"; statusTxt.style.color = "#e74c3c";
            } else {
                attackBtns.style.display = 'none'; defBtns.style.display = 'flex'; // Boştaysa defans butonları kalsın
                statusTxt.innerText = "Top Boşta"; statusTxt.style.color = "white";
            }

            document.getElementById('stamina-fill').style.width = playerStats.stamina + '%';
            if(input.isCharging) {
                input.actionCharge = Math.min(100, input.actionCharge + 2); // Bar dolum hızı
                powerFill.style.width = input.actionCharge + '%';
            }
        }

        function executeAction() {
            if(!input.isCharging || state.possession !== 'player') return;
            
            // Güce göre vektör hesapla
            let powerMultiplier = input.actionCharge / 100;
            let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(pitchObj.getWorldQuaternion(new THREE.Quaternion()));
            
            let force = 0;
            let upForce = 0;

            if(input.actionType === 'shoot') { force = 2.5 * powerMultiplier; upForce = 0.5 * powerMultiplier; }
            if(input.actionType === 'pass') { force = 1.0 * powerMultiplier; upForce = 0.1; }
            if(input.actionType === 'cross') { force = 1.8 * powerMultiplier; upForce = 1.2 * powerMultiplier; }

            // Falso (Curve): Şut anında joystick X ekseni nereyeyse, tersine/doğrultusuna falso verir.
            ballPhysics.curve = input.move.x * 0.05 * powerMultiplier;

            ballPhysics.vx = forward.x * force;
            ballPhysics.vy = forward.y * force + upForce;
            ballPhysics.vz = forward.z * force;

            state.possession = 'none';
            input.isCharging = false;
            input.actionCharge = 0;
            powerCont.style.display = 'none';
            powerFill.style.width = '0%';
        }

        function attemptTackle(isSlide = false) {
            let dist = yawObj.position.distanceTo(bot.position);
            let range = isSlide ? 12 : 6;
            if(dist < range && state.possession === 'bot') {
                state.possession = 'none';
                // Topu hafif sektir
                ballPhysics.vx = (Math.random() - 0.5) * 0.5;
                ballPhysics.vy = 0.5;
                ballPhysics.vz = (Math.random() - 0.5) * 0.5;
            }
        }

        function resetGame() {
            yawObj.position.set(0, 6, 80);
            bot.position.set(0, 6, -50);
            ballPhysics = { x: 0, y: 1.5, z: 0, vx: 0, vy: 0, vz: 0, curve: 0 };
            ball.position.set(0, 1.5, 0);
            state.possession = 'none';
            document.getElementById('info').innerHTML = `Skor: ${scores.player} - ${scores.bot}<br><span id="status">Top Boşta</span>`;
        }

        // --- 5. OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Oyuncu Hareketi (First Person)
            let speed = playerStats.speed;
            if(input.sprint && playerStats.stamina > 0) {
                speed *= playerStats.sprintMultiplier;
                playerStats.stamina -= 0.5;
            } else if (!input.sprint && playerStats.stamina < 100) {
                playerStats.stamina += 0.2;
            }

            if(input.move.x !== 0 || input.move.y !== 0) {
                // Kameranın baktığı yöne göre yürüme vektörü
                let dir = new THREE.Vector3(input.move.x, 0, input.move.y).applyAxisAngle(new THREE.Vector3(0,1,0), yawObj.rotation.y);
                yawObj.position.addScaledVector(dir, speed);
                
                // Saha sınırları (Oyuncu için)
                yawObj.position.x = Math.max(-55, Math.min(55, yawObj.position.x));
                yawObj.position.z = Math.max(-95, Math.min(95, yawObj.position.z));
            }

            // 2. Top Fizikleri ve Sahip Kontrolü
            if(state.possession === 'player') {
                // Top oyuncunun kamerasının biraz önünde ve altında durur
                let offset = new THREE.Vector3(0, -4, -5).applyAxisAngle(new THREE.Vector3(0,1,0), yawObj.rotation.y);
                ballPhysics.x = yawObj.position.x + offset.x;
                ballPhysics.y = 1.5;
                ballPhysics.z = yawObj.position.z + offset.z;
                ball.position.set(ballPhysics.x, ballPhysics.y, ballPhysics.z);
            } 
            else if (state.possession === 'bot') {
                // Top botun önünde
                ballPhysics.x = bot.position.x;
                ballPhysics.y = 1.5;
                ballPhysics.z = bot.position.z + 5;
                ball.position.set(ballPhysics.x, ballPhysics.y, ballPhysics.z);
            } 
            else {
                // Serbest Top Fizikleri
                ballPhysics.vy -= 0.05; // Yerçekimi
                
                // Falso etkisi (Sadece havada veya hızlıyken yana doğru ivme)
                if(Math.abs(ballPhysics.curve) > 0.001) {
                    // Kameranın baktığı yöne dik (sağ/sol) vektör bul
                    let rightVec = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), yawObj.rotation.y);
                    ballPhysics.vx += rightVec.x * ballPhysics.curve;
                    ballPhysics.vz += rightVec.z * ballPhysics.curve;
                    ballPhysics.curve *= 0.98; // Falso gücü zamanla azalır
                }

                ballPhysics.x += ballPhysics.vx;
                ballPhysics.y += ballPhysics.vy;
                ballPhysics.z += ballPhysics.vz;

                // Zemin Çarpışması
                if(ballPhysics.y < 1.5) {
                    ballPhysics.y = 1.5;
                    ballPhysics.vy *= -0.6; // Sekme
                    ballPhysics.vx *= 0.95; // Yerde sürtünme
                    ballPhysics.vz *= 0.95;
                }

                // Duvar Sınırları
                if(ballPhysics.x < -60 || ballPhysics.x > 60) { ballPhysics.vx *= -1; }
                if(ballPhysics.z < -100 || ballPhysics.z > 100) { 
                    // Gol Kontrolü
                    if(ballPhysics.x > -15 && ballPhysics.x < 15 && ballPhysics.y < 15) {
                        if(ballPhysics.z < -100) { scores.player++; resetGame(); return; } // Rakip kaleye gol
                        if(ballPhysics.z > 100) { scores.bot++; resetGame(); return; } // Kendi kalemize gol
                    } else {
                        ballPhysics.vz *= -1; // Aut'a çıkmasın sekip geri dönsün
                    }
                }
                
                ball.position.set(ballPhysics.x, ballPhysics.y, ballPhysics.z);

                // Sahipsizken kapma kontrolü
                let distToPlayer = new THREE.Vector2(yawObj.position.x, yawObj.position.z).distanceTo(new THREE.Vector2(ball.position.x, ball.position.z));
                let distToBot = new THREE.Vector2(bot.position.x, bot.position.z).distanceTo(new THREE.Vector2(ball.position.x, ball.position.z));
                
                // Eğer top yerdeyse ve yakınsa sahip ol
                if(ballPhysics.y < 5) {
                    if(distToPlayer < 6) state.possession = 'player';
                    else if(distToBot < 6) state.possession = 'bot';
                }
            }

            // Top dönsün (Görsellik)
            ball.rotation.x += ballPhysics.vz * 0.2;
            ball.rotation.z -= ballPhysics.vx * 0.2;

            // 3. Basit Bot Yapay Zekası
            if(state.possession === 'bot') {
                // Top bottayken senin kalene (Z = 100) doğru koşar
                let dirZ = 100 - bot.position.z;
                let dirX = 0 - bot.position.x; // Kalenin ortası
                let length = Math.sqrt(dirX*dirX + dirZ*dirZ);
                bot.position.x += (dirX/length) * botSpeed * 0.8; // Top sürerken yavaşlar
                bot.position.z += (dirZ/length) * botSpeed * 0.8;
                
                // Şut çekme (Kaleye yaklaşınca)
                if(bot.position.z > 60) {
                    state.possession = 'none';
                    ballPhysics.vx = (0 - ball.position.x) * 0.05;
                    ballPhysics.vy = 0.5;
                    ballPhysics.vz = 1.5; // Hızlı şut
                }

            } else if (state.possession === 'none') {
                // Top boştayken topa koşar
                let dirZ = ball.position.z - bot.position.z;
                let dirX = ball.position.x - bot.position.x;
                let length = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if(length > 0) {
                    bot.position.x += (dirX/length) * botSpeed;
                    bot.position.z += (dirZ/length) * botSpeed;
                }
            } else {
                // Top sendeyken seninle arasına mesafe koymaya / seni savunmaya çalışır
                let dirZ = yawObj.position.z - bot.position.z;
                let dirX = yawObj.position.x - bot.position.x;
                let length = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if(length > 10) { // Biraz boşluk bırakarak gelir
                    bot.position.x += (dirX/length) * botSpeed * 0.9;
                    bot.position.z += (dirZ/length) * botSpeed * 0.9;
                }
            }

            updateUI();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
